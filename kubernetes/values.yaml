serverFiles:
  alerting_rules.yml:
    groups:
    - name: autoflow-alerts
      rules:
      - alert: PodNotScheduled
        expr: kube_pod_status_phase{phase="Pending"} > 0
        for: 30s
        labels:
          severity: critical
        annotations:
          summary: "Pod stuck in Pending"

      - alert: HighCPUUsage
        expr: rate(container_cpu_usage_seconds_total[1m]) > 0.5
        for: 30s
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage"
